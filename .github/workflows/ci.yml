name: CI

on:
  pull_request:
  push:
    branches: [master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.python_label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.13"]
        include:
          - python: "3.9"
            python_label: "MIN Python"
          - python: "3.13"
            python_label: "MAX Python"

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - name: Resolve Basilisk ref
        id: bsk-ref
        shell: bash
        run: |
          BSK_VERSION=$(tr -d '[:space:]' < src/bsk_sdk/_bsk_version.txt)
          if [[ -z "$BSK_VERSION" ]]; then
            echo "_bsk_version.txt is empty" >&2
            exit 1
          fi

          for ref in "refs/tags/${BSK_VERSION}" "refs/tags/v${BSK_VERSION}"; do
            if git ls-remote --exit-code --refs https://github.com/AVSLab/basilisk.git "$ref" >/dev/null 2>&1; then
              echo "mode=tag" >> "$GITHUB_OUTPUT"
              echo "ref=$ref" >> "$GITHUB_OUTPUT"
              echo "resolved=$ref" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "mode=develop" >> "$GITHUB_OUTPUT"
          echo "ref=refs/heads/develop" >> "$GITHUB_OUTPUT"
          echo "resolved=refs/heads/develop" >> "$GITHUB_OUTPUT"

      - name: Checkout Basilisk submodule
        shell: bash
        run: |
          git submodule update --init --depth 1 external/basilisk
          git -C external/basilisk fetch origin "${{ steps['bsk-ref'].outputs.ref }}" --depth 1
          git -C external/basilisk checkout FETCH_HEAD

      - name: Report Basilisk ref
        shell: bash
        run: |
          echo "Using Basilisk ref: ${{ steps['bsk-ref'].outputs.resolved }}"

      - name: Sync artifacts
        run: python tools/sync_all.py

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel -o dist

      - uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl

  test:
    name: Test wheel (${{ matrix.os }}, ${{ matrix.python_label }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.13"]
        include:
          - python: "3.9"
            python_label: "MIN Python"
          - python: "3.13"
            python_label: "MAX Python"

    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: tests
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/download-artifact@v5
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist

      - name: Install wheel and test dependencies
        run: pip install dist/*.whl pytest
        shell: bash

      - name: Run smoke tests
        run: pytest tests/test_smoke.py -v

  examples:
    name: Build example plugin (${{ matrix.os }}, ${{ matrix.python_label }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.13"]
        include:
          - python: "3.9"
            python_label: "MIN Python"
          - python: "3.13"
            python_label: "MAX Python"

    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            .github/actions
            examples
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/download-artifact@v5
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist

      - name: Install bsk-sdk wheel and matching Basilisk
        # Install the locally built SDK wheel first, then read its embedded
        # Basilisk sync stamp so CI tests the plugin against the exact matching
        # bsk release instead of whichever version happens to be latest on PyPI.
        id: bsk-install
        run: |
          set -e
          pip install dist/*.whl --force-reinstall
          BSK_VERSION=$(python -c "import bsk_sdk; print(bsk_sdk.bsk_version(), end='')")
          echo "bsk_version=${BSK_VERSION}" >> "$GITHUB_OUTPUT"
          if ! pip install numpy "bsk==${BSK_VERSION}"; then
            echo "::warning::No released bsk wheel found for ${BSK_VERSION}; building Basilisk from source instead."
            pip install numpy
            echo "source_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "source_build=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Build and install Basilisk from source (fallback)
        if: steps.bsk-install.outputs.source_build == 'true'
        uses: ./.github/actions/install-bsk-from-source
        with:
          version: ${{ steps.bsk-install.outputs.bsk_version }}

      - name: Build example plugin wheel
        # Use --no-isolation so the build inherits the environment where the
        # locally built bsk-sdk wheel is already installed.  This guarantees CI
        # always tests the current branch's SDK — never a stale PyPI version.
        # (The example's pyproject.toml build-system.requires is still correct
        # for real users doing normal isolated builds from PyPI.)
        run: |
          pip install build scikit-build-core
          python -m build --wheel --no-isolation -o plugin-dist examples/custom-atm-plugin
        shell: bash

      - uses: actions/upload-artifact@v6
        with:
          name: plugin-wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: plugin-dist/*.whl
          retention-days: 7

      - name: Install plugin wheel and test dependencies
        run: pip install plugin-dist/*.whl pytest
        shell: bash

      - name: Run example plugin tests
        run: pytest examples/custom-atm-plugin/customExponentialAtmosphere/_UnitTest/test_customExponentialAtmosphere.py -v
