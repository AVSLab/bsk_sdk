name: CI

on:
  pull_request:
  push:
    branches: [master, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.python_label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.13"]
        include:
          - python: "3.9"
            python_label: "MIN Python"
          - python: "3.13"
            python_label: "MAX Python"

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - uses: ./.github/actions/build-sdk-wheel
        with:
          output-dir: dist

      - uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl

  test:
    name: Test wheel (${{ matrix.os }}, ${{ matrix.python_label }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.13"]
        include:
          - python: "3.9"
            python_label: "MIN Python"
          - python: "3.13"
            python_label: "MAX Python"

    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: tests
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/download-artifact@v6
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist

      - name: Install wheel and test dependencies
        run: pip install dist/*.whl pytest
        shell: bash

      - name: Run smoke tests
        run: pytest tests/test_smoke.py -v

  examples:
    name: Build example plugin (${{ matrix.os }}, ${{ matrix.python_label }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.13"]
        include:
          - python: "3.9"
            python_label: "MIN Python"
          - python: "3.13"
            python_label: "MAX Python"

    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: |
            examples
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/download-artifact@v6
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist

      - name: Install bsk-sdk wheel and Basilisk from patch/v2_10_x
        run: |
          pip install dist/*.whl --force-reinstall
          git clone --depth 1 --branch patch/v2_10_x \
            https://github.com/AVSLab/basilisk.git _bsk_src
          pip install numpy
          pip install ./_bsk_src
        shell: bash

      - name: Build example plugin wheel
        # Use --no-isolation so the build inherits the environment where the
        # locally built bsk-sdk wheel is already installed.  This guarantees CI
        # always tests the current branch's SDK — never a stale PyPI version.
        # (The example's pyproject.toml build-system.requires is still correct
        # for real users doing normal isolated builds from PyPI.)
        run: |
          pip install build scikit-build-core
          python -m build --wheel --no-isolation -o plugin-dist examples/custom-atm-plugin
        shell: bash

      - uses: actions/upload-artifact@v6
        with:
          name: plugin-wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: plugin-dist/*.whl
          retention-days: 7

      - name: Install plugin wheel and test dependencies
        run: pip install plugin-dist/*.whl pytest
        shell: bash

      - name: Run example plugin tests
        run: pytest examples/custom-atm-plugin/customExponentialAtmosphere/_UnitTest/test_customExponentialAtmosphere.py -v
