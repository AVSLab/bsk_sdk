name: CI

on:
  pull_request:
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }}, ${{ matrix.python_label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.13"]
        include:
          - python: "3.9"
            python_label: "MIN Python"
          - python: "3.13"
            python_label: "MAX Python"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Sync artifacts
        run: python tools/sync_all.py

      - name: Build wheel
        run: |
          pip install build
          python -m build --wheel -o dist

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist/*.whl

  test:
    name: Test wheel (${{ matrix.os }}, ${{ matrix.python_label }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.13"]
        include:
          - python: "3.9"
            python_label: "MIN Python"
          - python: "3.13"
            python_label: "MAX Python"

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: tests
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist

      - name: Install wheel and test dependencies
        run: pip install dist/*.whl pytest
        shell: bash

      - name: Run smoke tests
        run: pytest tests/test_smoke.py -v

  examples:
    name: Build example plugin (${{ matrix.os }}, ${{ matrix.python_label }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.13"]
        include:
          - python: "3.9"
            python_label: "MIN Python"
          - python: "3.13"
            python_label: "MAX Python"

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: |
            examples
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - uses: actions/download-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: dist

      - name: Install bsk-sdk wheel and dependencies
        # Install bsk first so its transitive deps are resolved, then force-reinstall from the locally
        # built wheel so the CI always tests the current source.
        run: |
          pip install numpy bsk
          pip install dist/*.whl --force-reinstall
        shell: bash

      - name: Build example plugin wheel
        run: |
          pip install build scikit-build-core
          python -m build --wheel -o plugin-dist examples/custom-atm-plugin
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: plugin-wheel-${{ matrix.os }}-py${{ matrix.python }}
          path: plugin-dist/*.whl
          retention-days: 7

      - name: Install plugin wheel and test dependencies
        run: pip install plugin-dist/*.whl pytest
        shell: bash

      - name: Run example plugin tests
        run: pytest examples/custom-atm-plugin/customExponentialAtmosphere/_UnitTest/test_customExponentialAtmosphere.py -v
