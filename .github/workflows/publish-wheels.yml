name: Publish Wheels

on:
  push:
    tags:
      - "v[0-9]*"
      - "test*"

jobs:
  build:
    name: Build wheel and sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Determine BSK release tag
        id: bsk-tag
        shell: bash
        run: |
          BSK_TAG=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              version = tomllib.load(f)['project']['version']
          print('v' + version)
          ")
          echo "tag=$BSK_TAG" >> $GITHUB_OUTPUT

      - name: Checkout Basilisk submodule at release tag
        shell: bash
        run: |
          git submodule update --init --depth 1 external/basilisk
          git -C external/basilisk fetch origin \
            refs/tags/${{ steps['bsk-tag'].outputs.tag }}:refs/tags/${{ steps['bsk-tag'].outputs.tag }} \
            --depth 1
          git -C external/basilisk checkout ${{ steps['bsk-tag'].outputs.tag }}

      - name: Sync Basilisk artifacts
        run: python tools/sync_all.py

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheel and sdist
        env:
          # Sync artifacts are already present from the step above;
          # the build backend will find them and skip auto-sync.
          BSK_SDK_AUTO_SYNC: "0"
        run: python -m build --outdir dist

      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist

      - name: Validate distributions with twine
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Publish to TestPyPI (test tags)
        if: startsWith(github.ref, 'refs/tags/test')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true
          verbose: true

      - name: Publish to PyPI (release tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
          verbose: true
