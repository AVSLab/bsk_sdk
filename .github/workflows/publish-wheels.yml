name: Publish Wheels

on:
  push:
    tags:
      - "v[0-9]*"
      - "test*"

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest # manylinux x86_64
          - ubuntu-22.04-arm # manylinux aarch64
          - macos-latest # macOS arm64
          - windows-latest # Windows x86_64

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Determine BSK release tag
        id: bsk-tag
        shell: bash
        run: |
          BSK_TAG=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              version = tomllib.load(f)['project']['version']
          print('v' + version)
          ")
          echo "tag=$BSK_TAG" >> $GITHUB_OUTPUT

      - name: Checkout Basilisk submodule at release tag
        shell: bash
        run: |
          git submodule update --init --depth 1 external/basilisk
          git -C external/basilisk fetch origin \
            refs/tags/${{ steps['bsk-tag'].outputs.tag }}:refs/tags/${{ steps['bsk-tag'].outputs.tag }} \
            --depth 1
          git -C external/basilisk checkout ${{ steps['bsk-tag'].outputs.tag }}

      - name: Sync Basilisk artifacts (host)
        run: python tools/sync_all.py

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.1.4
        env:
          # Sync artifacts are already present from the host step above;
          # the build backend will find them and skip auto-sync.
          BSK_SDK_AUTO_SYNC: "0"

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  make-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Determine BSK release tag
        id: bsk-tag
        run: |
          BSK_TAG=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              version = tomllib.load(f)['project']['version']
          print('v' + version)
          ")
          echo "tag=$BSK_TAG" >> $GITHUB_OUTPUT

      - name: Checkout Basilisk submodule at release tag
        run: |
          git submodule update --init --depth 1 external/basilisk
          git -C external/basilisk fetch origin \
            refs/tags/${{ steps['bsk-tag'].outputs.tag }}:refs/tags/${{ steps['bsk-tag'].outputs.tag }} \
            --depth 1
          git -C external/basilisk checkout ${{ steps['bsk-tag'].outputs.tag }}

      - name: Sync Basilisk artifacts
        run: python tools/sync_all.py

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v6
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, make-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v5
        with:
          pattern: cibw-wheels-*
          merge-multiple: true
          path: dist

      - name: Download sdist
        uses: actions/download-artifact@v5
        with:
          name: cibw-sdist
          path: dist

      - name: Publish to TestPyPI (test tags)
        if: startsWith(github.ref, 'refs/tags/test')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true
          verbose: true

      - name: Publish to PyPI (release tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          verbose: true
