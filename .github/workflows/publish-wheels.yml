name: Publish Wheels

on:
  push:
    tags:
      - "v[0-9]*"
      - "test*"

jobs:
  build-wheels:
    name: Build wheel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve Basilisk ref
        id: bsk-ref
        shell: bash
        run: |
          BSK_VERSION=$(tr -d '[:space:]' < src/bsk_sdk/_bsk_version.txt)
          if [[ -z "$BSK_VERSION" ]]; then
            echo "_bsk_version.txt is empty" >&2
            exit 1
          fi

          FOUND_REF=""
          for ref in "refs/tags/${BSK_VERSION}" "refs/tags/v${BSK_VERSION}"; do
            if git ls-remote --exit-code --refs https://github.com/AVSLab/basilisk.git "$ref" >/dev/null 2>&1; then
              FOUND_REF="$ref"
              break
            fi
          done

          if [[ -z "$FOUND_REF" ]]; then
            echo "No matching Basilisk release tag found for ${BSK_VERSION}." >&2
            echo "Publish workflow only supports released Basilisk versions." >&2
            echo "Expected one of: refs/tags/${BSK_VERSION} or refs/tags/v${BSK_VERSION}." >&2
            exit 1
          fi

          echo "ref=$FOUND_REF" >> "$GITHUB_OUTPUT"
          echo "resolved=$FOUND_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout Basilisk submodule
        shell: bash
        run: |
          git submodule update --init --depth 1 external/basilisk
          git -C external/basilisk fetch origin "${{ steps['bsk-ref'].outputs.ref }}" --depth 1
          git -C external/basilisk checkout FETCH_HEAD

      - name: Report Basilisk ref
        shell: bash
        run: |
          echo "Using Basilisk ref: ${{ steps['bsk-ref'].outputs.resolved }}"

      - name: Sync Basilisk artifacts (host)
        run: python tools/sync_all.py

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build wheel
        env:
          # Sync artifacts are already present from the host step above;
          # the build backend will find them and skip auto-sync.
          BSK_SDK_AUTO_SYNC: "0"
        run: python -m build --wheel --outdir wheelhouse

      - uses: actions/upload-artifact@v6
        with:
          name: wheel-dist
          path: ./wheelhouse/*.whl

  make-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Resolve Basilisk ref
        id: bsk-ref
        shell: bash
        run: |
          BSK_VERSION=$(tr -d '[:space:]' < src/bsk_sdk/_bsk_version.txt)
          if [[ -z "$BSK_VERSION" ]]; then
            echo "_bsk_version.txt is empty" >&2
            exit 1
          fi

          FOUND_REF=""
          for ref in "refs/tags/${BSK_VERSION}" "refs/tags/v${BSK_VERSION}"; do
            if git ls-remote --exit-code --refs https://github.com/AVSLab/basilisk.git "$ref" >/dev/null 2>&1; then
              FOUND_REF="$ref"
              break
            fi
          done

          if [[ -z "$FOUND_REF" ]]; then
            echo "No matching Basilisk release tag found for ${BSK_VERSION}." >&2
            echo "Publish workflow only supports released Basilisk versions." >&2
            echo "Expected one of: refs/tags/${BSK_VERSION} or refs/tags/v${BSK_VERSION}." >&2
            exit 1
          fi

          echo "ref=$FOUND_REF" >> "$GITHUB_OUTPUT"
          echo "resolved=$FOUND_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout Basilisk submodule
        shell: bash
        run: |
          git submodule update --init --depth 1 external/basilisk
          git -C external/basilisk fetch origin "${{ steps['bsk-ref'].outputs.ref }}" --depth 1
          git -C external/basilisk checkout FETCH_HEAD

      - name: Report Basilisk ref
        shell: bash
        run: |
          echo "Using Basilisk ref: ${{ steps['bsk-ref'].outputs.resolved }}"

      - name: Sync Basilisk artifacts
        run: python tools/sync_all.py

      - name: Install build tooling
        run: python -m pip install --upgrade pip build

      - name: Build sdist
        run: python -m build --sdist --outdir dist

      - uses: actions/upload-artifact@v6
        with:
          name: sdist-dist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build-wheels, make-sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download wheels
        uses: actions/download-artifact@v5
        with:
          name: wheel-dist
          path: dist

      - name: Download sdist
        uses: actions/download-artifact@v5
        with:
          name: sdist-dist
          path: dist

      - name: Validate distributions with twine
        run: |
          python -m pip install --upgrade pip twine
          python -m twine check dist/*

      - name: Publish to TestPyPI (test tags)
        if: startsWith(github.ref, 'refs/tags/test')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true
          verbose: true

      - name: Publish to PyPI (release tags)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
          verbose: true
