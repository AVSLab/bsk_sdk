name: Nightly

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:

jobs:
  nightly:
    name: SDK vs BSK develop
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: false

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Clone Basilisk develop
        run: |
          git clone --depth 1 --branch develop \
            https://github.com/AVSLab/basilisk.git external/basilisk

      - name: Install BSK nightly wheel
        run: |
          pip install --pre \
            --index-url https://avslab.github.io/basilisk/nightly/ \
            --extra-index-url https://pypi.org/simple/ \
            "bsk[all]"

      - name: Sync and build SDK
        run: |
          python tools/sync_all.py
          pip install build
          python -m build --wheel -o dist
          pip install dist/*.whl

      - name: Run smoke tests
        run: |
          pip install pytest
          pytest tests/test_smoke.py -v

      - name: Build and test example extension
        run: |
          pip install scikit-build-core
          python -m build --wheel --no-isolation -o extension-dist examples/custom-atm-extension
          pip install extension-dist/*.whl
          python -c "import Basilisk, numba, custom_atm; from custom_atm import numbaAtmosphere"
          pytest examples/custom-atm-extension -v

      - name: Notify on failure
        if: failure()
        run: echo "::warning::Nightly build failed. BSK develop may have introduced a breaking change for bsk-sdk."
