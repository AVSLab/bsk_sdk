name: Nightly

on:
  schedule:
    - cron: "0 6 * * *" # 06:00 UTC daily
  workflow_dispatch:

jobs:
  nightly:
    name: SDK vs BSK develop
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - name: Update Basilisk submodule to develop tip
        run: |
          git -C external/basilisk fetch origin develop --depth 1
          git -C external/basilisk checkout FETCH_HEAD

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-setuptools python3-tk libgtk2.0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: mozilla/sccache-action@v0.0.9

      - name: Set sccache as compiler launcher
        run: |
          echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Cache Conan packages
        uses: actions/cache@v5
        with:
          path: ~/.conan2
          key: conan-ubuntu-py3.13-${{ hashFiles('external/basilisk/conan.lock', 'external/basilisk/conanfile.*') }}
          restore-keys: conan-ubuntu-py3.13-


      - name: Build and install Basilisk from source
        uses: ./.github/actions/install-bsk-from-source
        with:
          ref: refs/heads/develop

      - name: Sync and install SDK
        run: |
          python tools/sync_all.py
          pip install build
          python -m build --wheel -o dist
          pip install dist/*.whl

      - name: Smoke-test SDK
        run: pytest tests/test_smoke.py -v

      - name: Build and test example plugin
        run: |
          pip install scikit-build-core pytest
          python -m build --wheel --no-isolation -o plugin-dist examples/custom-atm-plugin
          pip install plugin-dist/*.whl
          pytest examples/custom-atm-plugin/customExponentialAtmosphere/_UnitTest/test_customExponentialAtmosphere.py -v

      - name: Notify on failure
        if: failure()
        run: echo "::warning::Nightly build failed. BSK develop may have introduced a breaking change for bsk-sdk."
